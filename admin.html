<!doctype html><html lang='no'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Admin | Tobakksbutikk</title><link rel='stylesheet' href='styles.css'><script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script></head><body><div class='announcement'>Adminpanel • Tobakksbutikk</div><header class='header'><a class='logo' href='index.html'><span class='logo-mark'>TB</span><span>Tobakksbutikk</span></a><nav><a href='index.html'>Se butikk</a></nav></header><main class='section'><p class='eyebrow'>Admin</p><h1>Produktpanel</h1><section id='login-panel' class='login-card'><h2>Logg inn</h2><form id='login-form' class='form'><input id='login-email' type='email' required placeholder='E-post'><input id='login-password' type='password' required placeholder='Passord'><button class='btn'>Logg inn</button></form><p id='login-message' class='notice hidden'></p></section><section id='admin-panel' class='hidden'><div class='admin-toolbar'><p>Innlogget som <strong id='admin-email'></strong></p><button id='logout-btn' class='btn secondary'>Logg ut</button></div><div class='admin-layout'><section><h2>Legg til / oppdater produkt</h2><form id='product-form' class='form'><input id='product-id' type='hidden'><input id='sku' placeholder='SKU'><input id='name' required placeholder='Produktnavn'><input id='slug' required placeholder='Slug, f.eks. smoking-gold'><select id='category'></select><input id='price' type='number' step='0.01' min='0' required placeholder='Pris NOK'><input id='stock' type='number' min='0' placeholder='Lager'><input id='image' placeholder='Bilde-URL'><textarea id='description' placeholder='Produktbeskrivelse'></textarea><label><input id='featured' type='checkbox'> Fremhevet produkt</label><label><input id='active' type='checkbox' checked> Aktivt produkt</label><div class='button-row'><button class='btn'>Lagre produkt</button><button class='btn secondary' type='button' id='clear-form'>Tøm skjema</button></div></form><p id='admin-message' class='notice hidden'></p></section><section><h2>Produkter (<span id='admin-count'>0</span>)</h2><div class='table-wrap'><table class='table'><thead><tr><th>Produkt</th><th>Kategori</th><th>Pris</th><th>Lager</th><th></th></tr></thead><tbody id='admin-products'></tbody></table></div></section></div></section></main><script src='admin.js'></script></body></html>
